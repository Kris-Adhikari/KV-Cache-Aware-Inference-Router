apiVersion: v1
kind: Service
metadata:
  name: mock
  labels:
    app: mock
spec:
  clusterIP: None
  selector:
    app: mock
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mock
spec:
  serviceName: mock
  replicas: 3
  selector:
    matchLabels:
      app: mock
  template:
    metadata:
      labels:
        app: mock
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mockvllm
          image: kv-router/mockvllm:dev
          imagePullPolicy: IfNotPresent
          args: ["-addr", ":8000", "-base", "20ms", "-prefill", "1ms"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
